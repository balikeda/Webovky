<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zmrzlina z Opočna | Poctivá chuť</title>
    <style>
        /* Moderní vzhled a barvy */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fffaf0; /* Jemná krémová barva */
            color: #4a2c2a;
            text-align: center;
        }

        header {
            background-color: #ff6f61; /* Barva zralých jahod */
            color: white;
            padding: 40px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 { margin: 0; font-size: 2.5em; }
        p { font-size: 1.2em; line-height: 1.6; }

        .ice-cream-icon {
            font-size: 50px;
            margin: 20px 0;
        }

        /* Styl pro platební tlačítko */
        .buy-button {
            display: inline-block;
            background-color: #4CAF50; /* Zelená barva pro akci */
            color: white;
            padding: 18px 35px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.3em;
            transition: transform 0.2s, background-color 0.2s;
            margin-top: 30px;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
        }

        .buy-button:hover {
            background-color: #45a049;
            transform: scale(1.05); /* Tlačítko se při najetí mírně zvětší */
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <h1>🍦 Legendární Zmrzlina z Opočna</h1>
        <p>Tradice, která se rozplývá na jazyku</p>
    </header>

    <div class="container">
        <div class="ice-cream-icon">🍧</div>
        <h2>Proč naše zmrzlina?</h2>
        <p>Žádná náhražka, jen poctivý základ z podhůří Orlických hor. Naše zmrzlina je vyráběna podle receptury, kterou milují generace. Hust
